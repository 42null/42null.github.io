<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <link href="/../../../style.css" rel="stylesheet" type="text/css" />

    <title>Search Trees</title>
    <link rel="../../../Images/favicons/apple-touch-icon" sizes="180x180"
        href="../../../Images/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../../../Images/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../../Images/favicons/favicon-16x16.png">
    <script src="https://kit.fontawesome.com/eaed8eb078.js" crossorigin="anonymous"></script>
</head>

<body>

    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    <style src="/PageFragments/navStyle.css"></style>
    <!--Navigation bar-->
    <div id="nav-placeholder"></div>
    <script>$(function () {$("#nav-placeholder").load("/PageFragments/nav.html");});</script>



    <div class="image_banner">
        <div class="image_banner_text" id="image_banner_text" style="background-color: #5959597a;">
            <h1 style="font-size: 10vh">Search Trees</h1>
            <center>
                <p style="font-size: 4vh">Find out which trees are best for you</p>
                <button style="font-size: 3vh" title="Back to full catalog" <span><a href="../Catolog.html" target="_self">Back to Whole-Catalog Search</a></span>

            </center>
            </form>
        </div>
    </div>
    <div id="selectProduct" style="backgorund-color:#fff;"></div>
    
</body>

<script>
    var categories = ["_____ ______ Choke­Cherry", "_____ Birch", ];


    var grid = document.createElement('div');
    grid.style.display = 'grid';
    grid.style.gridTemplateColumns = 'repeat(auto-fit, minmax(200px, 1fr))';
    // grid.style.gridGap = '10px';
    var addToElement = document.getElementById('selectProduct');
    // addToElement.style.backgroundColor = "var(--dark_lighter_background)";
    grid.style.padding = "0% 0% 1%";
    addToElement.appendChild(grid);
    for (var i = 0; i < categories.length; i++) {
        var cellBackground = document.createElement('a');
        var cellInner = document.createElement('div');
        var stockOptions = document.createElement('div');
        
        // cellBackground.style.padding = '20px';
        // cellBackground.style.borderColor = 'var(--background-color)';
        cellBackground.style.backgroundColor = "black";
        cellBackground.style.border = "thin solid red";
        cellBackground.style.textDecoration = "none"
        cellBackground.style.height = "65vh"
        if(i!=0){
            cellBackground.style.marginLeft = "2%";
        }else{
            cellBackground.style.marginRight = "2%";
        }
        
        cellBackground.style.textAlign = 'center';
        // cellBackground.setAttribute('id', 'clippedCorners');
        cellBackground.setAttribute('href', "./Categories/" + categories[i].replace(/­/g, "") + ".html");

        cellInner.setAttribute("class", "breakAndHyphensAll");
        cellInner.style.textAlign = 'inherit';
        cellInner.style.fontSize = "2em";
        cellInner.style.fontWeight = 'bold';
        cellInner.style.background = 'white';
        cellInner.style.backgroundImage = "https://picsum.photos/200/300";
        // cellInner.style.mixBlendMode = "difference";
        for (var j = 0; j < categories[i].length; j++){
            cellInner.innerHTML += categories[i].charAt(j);
        }
        cellInner.style.textDecoration = "none";
        cellInner.style.backgroundSize = 'cover';
        cellInner.style.backgroundPosition = 'center';
        cellInner.style.color = 'black';
        cellBackground.style.background = "linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1)), url('http://placehold.it/350x150')"
        cellInner.style.opacity = 0.6;


//Picture Buttons
        cellBackground.appendChild(cellInner);
        var buttonSummer = document.createElement('button');
        var buttonWinter = document.createElement('button');
        buttonSummer.textContent = "Summer";
        buttonWinter.textContent = "Winter";
        buttonSummer.style.height = "5%";
        buttonWinter.style.height = "5%";

        cellInner.style.width = "100%";//HERE@@@//@@@
        // cellInner.style.width = DO RESET PARENT /SET CELL INNER

        buttonSummer.style.width = "20%";
        buttonSummer.style.right = "500vw";
        buttonSummer.style.textAlign = "center";
        buttonSummer.style.color = "purple";
        buttonSummer.style.fontWeight = "bold"; 
        cellInner.appendChild(document.createElement("br"));
        cellInner.appendChild(document.createElement("br"));
        cellInner.appendChild(document.createElement("br"));
        cellInner.appendChild(document.createElement("br"));
        cellInner.appendChild(buttonSummer);
        cellBackground.appendChild(buttonWinter);
        cellBackground.width = "100%";
        
        cellBackground.style.backgroundImage = 'url(../../../Images/GreenHouse/CollagePage/' + i + ".jpg" + ')';
        grid.appendChild(cellBackground);
    }
</script>
</html>
