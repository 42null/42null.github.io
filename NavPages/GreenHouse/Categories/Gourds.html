<script type="text/javascript"
    src="https://42null.memmojs.repl.co/NavPages/GreenHouse/Categories/inventory.js"></script>


<script>
    //Primary page info changes
    document.title += " " + PRODUCT_PAGE;

    // getStockFromCategoryTypeVarient("gourds","babyPumpkin","orange",2);

    var products = getTitlesFromCategoryTypeColor("gourds", "babyPumpkin", "orange");

    var grid = document.createElement('div');
    grid.style.display = 'grid';
    grid.style.gridTemplateColumns = 'repeat(auto-fit, minmax(200px, 1fr))';
    // grid.style.gridGap = '10px';
    var addToElement = document.getElementById('selectProduct');
    // addToElement.style.backgroundColor = "var(--dark_lighter_background)";
    grid.style.padding = "0% 0% 1%";
    addToElement.appendChild(grid);
    for (var i = 0; i < products.length; i++) {
        var cellBackground = document.createElement('a');
        var cellInner = document.createElement('div');
        var stockOptions = document.createElement('div');

        cellBackground.style.textDecoration = "none"
        cellBackground.style.height = "65vh"
        // cellBackground.backgroundSize = "cover";
        if(i != 0){
            cellBackground.style.marginLeft = "2%";
        }else{
            cellBackground.style.marginRight = "2%";
        }
        cellBackground.style.textAlign = 'center';
        // cellBackground.setAttribute('id', 'clippedCorners');
        // cellBackground.setAttribute('href', "./Categories/" + products[i].replace(/­/g, "") + ".html");

        cellInner.setAttribute("class", "breakAndHyphensAll");
        cellInner.style.textAlign = 'inherit';
        cellInner.style.fontSize = "2em";
        cellInner.style.fontWeight = 'bold';
        cellInner.style.background = 'white';
        // cellInner.style.mixBlendMode = "difference";
        for (var j = 0; j < products[i].title.length; j++) {
            cellInner.innerHTML += products[i].title.charAt(j);
        }
        cellInner.innerHTML = products[i].productID;
        cellInner.style.textDecoration = "none";
        cellInner.style.backgroundSize = 'cover';
        cellInner.style.backgroundPosition = 'center';
        cellInner.style.color = 'black';
        cellBackground.style.background = "linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1)), url('http://placehold.it/350x150')"
        cellInner.style.opacity = 0.6;


        //Picture Buttons
        cellBackground.appendChild(cellInner);
        var buttonSummer = document.createElement('button');
        var buttonHead = document.createElement('div');
        var buttonWinter = document.createElement('button');

        var addToCart = document.createElement('div');
        var addToCartButton = document.createElement('button');


        buttonHead.style.backgroundHead = "";

        buttonSummer.textContent = "Summer View";
        buttonWinter.textContent = "Winter View";
        buttonSummer.style.height = "100%";
        buttonWinter.style.height = "100%";
        buttonSummer.style.width = "10%";
        buttonWinter.style.width = "10%";

        cellInner.style.width = "100%";//HERE@@@//@@@
        cellInner.appendChild(document.createElement("br"));
        buttonHead.appendChild(buttonSummer);
        buttonHead.appendChild(buttonWinter);

        buttonWinter.setAttribute("class", "right5p");
        buttonSummer.setAttribute("class", "left5p");
        buttonHead.setAttribute("class", "buttonHead");
        cellBackground.style.position = "relative";
        cellBackground.appendChild(buttonHead);
        cellBackground.height = "100%";
        cellBackground.style.background = "blue";
        cellBackground.style.backgroundRepeat = "no-repeat, repeat-x, repeat-y";
        // cellBackground.style.backgroundSize="50% 100%";
        cellBackground.style.backgroundSize = "50% auto";


        cellBackground.style.backgroundImage = 'url(../../../../Images/GreenHouse/InventoryPhotos/' + products[i].productID + "a.jpg" + '),'+'url( ../../../../Images/GreenHouse/InventoryPhotos/' + products[i].productID + "b.jpg" + ')';
        var infoUnder = document.createElement("div");
        infoUnder.style.background = "black";
        var stockTxt = document.createElement("p");
        stockTxt.setAttribute("class", "numberInStock");
        // stockTxt.textContent = "Unable to get # of stock avaiable";

        stockTxt.textContent = "" + products[i].description;
        // stockTxt.appendChild(document.createElement('br'));
        stockTxt.textContent += "\n " + products[i].inStock + " " + products[i].category + " of type " + products[i].title + "'s remaining";


        infoUnder.appendChild(stockTxt);
        
        addToCart.setAttribute("class", "addToCartButton");
        // var addToCartButton = new             <label>How much do you want to order? $<input type=number min=0 step=0.01 name=price></label>
        addToCartButton.textContent = "Add To Cart";
        addToCart.style.bottom = 0;
        const cookieStockID = products[i].productID;
        const numberOfStock = 5;
        addToCart.addEventListener('click', () => {
            updateCartCookieContents(cookieStockID, numberOfStock);
        });
        cellBackground.appendChild(infoUnder);
        addToCart.appendChild(addToCartButton);
        infoUnder.appendChild(addToCart);

        grid.appendChild(cellBackground);
    }

    let tempElements = document.getElementsByClassName("pageCategory");
    for (let i = 0; i < tempElements.length; i++) {
        tempElements[i].textContent = PRODUCT_PAGE.toLowerCase();
    }
</script>

<style>
    .buttonHead {
        position: absolute;
        color: orange;
        height: 5vh;
        width: 100%;
        top: 10%;
    }

    .addToCartButton {
        display: block;
        overflow: auto;
/*         padding: -5% 4% 4% 4%;
        /*         opacity: 0.8; */
        position: absolute;
        bottom: 0px;
        text-align: center;
    }

    .numberInStock {
        display: block;
        overflow: auto;
        padding: -5% 4% 4% 4%;
        /*         opacity: 0.8; */
        background: seagreen;
        position: absolute;
        /*         color: orange; */
        /*         bottom: -5vh; */
        bottom: 0px;
        text-align: left;
    }
    
    .left5p {
        float: left;
        bottom: 0px;
        margin-left: 5%;
    }

    .right5p {
        float: right;
        margin-right: 5%;
    }

    .left10p {
        float: left;
        margin-left: 10%;
    }

    .right10p {
        float: right;
        margin-right: 10%;
    }

    .pageCategory {
        content: "gourds";
    }
</style>
