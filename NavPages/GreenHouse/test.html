<script>
    var categories = ["Trees","Houseplants","Carnivorous","Garden","Natives","Flowering","Starters and Kits","Seeds","Verified Propagations"];

    
    var grid = document.createElement('div');
    grid.style.display = 'grid';
    grid.style.gridTemplateColumns = 'repeat(auto-fit, minmax(20%, 1fr))';
    grid.style.gridGap = '10px';
    document.body.appendChild(grid);
    for (var i = 0; i < categories.length; i++) {
        var cell = document.createElement('div');
        cell.style.backgroundColor = '#f00';
        cell.style.padding = '20px';
        cell.style.textAlign = 'center';
        cell.innerHTML = categories[i].substr(0);
        cell.setAttribute('id','clippedCorners');
        grid.appendChild(cell);
    }
</script>
