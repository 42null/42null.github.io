<script>
    var headersToAnimate = [" Lawn.", " Garden.", " House.", " Workplace.", " Desk.", "..."];
    var startReversAnimationAfter = 3000; //ms


    function reverseAnimation(headerIndex) {
        var i = headersToAnimate[headerIndex].length - 1, delay = 0;
        for (; i >= 0; i--, delay++) {
            let string = headersToAnimate[headerIndex].substr(0, i);
            setTimeout('document.getElementById("animated_typing").innerHTML = \'' + string + '\';', 100 * delay);
        }
        setTimeout('document.getElementById("blinking_cursor").innerHTML = \'' + "|" + '\';', (headersToAnimate[headerIndex].length + 1) * 200);
        setTimeout('document.getElementById("blinking_cursor").innerHTML = \'' + "" + '\';', (headersToAnimate[headerIndex].length + 2) * 200);
        setTimeout('document.getElementById("blinking_cursor").innerHTML = \'' + "|" + '\';', (headersToAnimate[headerIndex].length + 4) * 200);
        setTimeout('document.getElementById("blinking_cursor").innerHTML = \'' + "" + '\';', (headersToAnimate[headerIndex].length + 6) * 200);
        setTimeout('document.getElementById("blinking_cursor").innerHTML = \'' + "|" + '\';', (headersToAnimate[headerIndex].length + 8) * 200);
        setTimeout(function () {animateHeaders(headerIndex + 1)}, 100 * delay + startReversAnimationAfter);

    }
    function animateHeaders(headerIndex) {
        var i = 0;
        if (headerIndex == headersToAnimate.length) {
            headerIndex = 0;
        }
        for (; i < headersToAnimate[headerIndex].length; i++) {
            let string = headersToAnimate[headerIndex][i]
            setTimeout('document.getElementById("animated_typing").innerHTML += \'' + string + '\';', 200 * i);
        }
        setTimeout('document.getElementById("blinking_cursor").innerHTML = \'' + "|" + '\';', (headersToAnimate[headerIndex].length + 2) * 200);
        setTimeout('document.getElementById("blinking_cursor").innerHTML = \'' + "" + '\';', (headersToAnimate[headerIndex].length + 4) * 200);
        setTimeout('document.getElementById("blinking_cursor").innerHTML = \'' + "|" + '\';', (headersToAnimate[headerIndex].length + 6) * 200);
        setTimeout('document.getElementById("blinking_cursor").innerHTML = \'' + "" + '\';', (headersToAnimate[headerIndex].length + 8) * 200);
        setTimeout('document.getElementById("blinking_cursor").innerHTML = \'' + "|" + '\';', (headersToAnimate[headerIndex].length + 10) * 200);

        // setTimeout('document.getElementById("blinking_cursor").innerHTML = \'' + "|" + '\';', (headersToAnimate[headerIndex].length-1) * 200 + 105);
        setTimeout(function () {reverseAnimation(headerIndex)}, 200 * i + startReversAnimationAfter);


    }

    setTimeout(function () {animateHeaders(0)}, 1000);
</script>

<script>
    var categories = ["Trees", "House­plants", "Succul­ents", "Carnivor­ous", "Garden", "Natives", "Flowering", "Starters and Kits", "Seeds", "Verified Propag­ations","Gourds"];


    var grid = document.createElement('div');
    grid.style.display = 'grid';
    grid.style.gridTemplateColumns = 'repeat(auto-fit, minmax(200px, 1fr))';
    grid.style.gridGap = '10px';
    var addToElement = document.getElementById('searchByCategory');
    addToElement.style.backgroundColor = "black";
    // addToElement.insertBefore(grid, addToElement.firstChild);
    // grid.style.width = "80%";
    grid.style.padding = "2% 2% 2% 2%";
    addToElement.appendChild(grid);
    for (var i = 0; i < categories.length; i++) {
        var cellBackground = document.createElement('a');
        var cellInner = document.createElement('div');
        // var image = document.createElement('img');
        // cellBackground.style.backgroundColor = '#000';
        cellBackground.style.padding = '20px';
        cellBackground.style.textAlign = 'center';
        cellBackground.setAttribute('id', 'clippedCorners');
        cellBackground.setAttribute('href', "./Categories/" + categories[i].replace(/­/g, "").replace(" ","") + ".html");

        cellInner.setAttribute("class", "breakAndHyphensAll");
        cellInner.style.textAlign = 'inherit';
        cellInner.style.fontSize = "2em";
        cellInner.style.fontWeight = 'bold';
        cellInner.style.backgroundColor = 'white';
        // cellInner.style.color = "white";
        // cellInner.style.mixBlendMode = "difference";
        cellInner.innerHTML += categories[i].charAt(0);
        for (var j = 1; j < categories[i].length; j++) {
            // cellInner.innerHTML += "­";
            cellInner.innerHTML += categories[i].charAt(j);
        }
        cellInner.style.textDecoration = "none";
        cellBackground.style.textDecoration = "none"
        // image.src = "../../Images/GreenHouse/CollagePage/"+i+".jpg";
        // image.style.width = "100%";
        // cell.appendChild(image);
        // cellInner.style.backgroundImage = 'url(../../Images/GreenHouse/CollagePage/' +i+".jpg" + ')';
        cellInner.style.backgroundSize = 'cover';
        cellInner.style.backgroundPosition = 'center';
        cellInner.style.color = 'black';
        cellBackground.style.background = "linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1)), url('http://placehold.it/350x150')"
        cellInner.style.opacity = 0.6;
        cellBackground.appendChild(cellInner);
        cellBackground.style.backgroundImage = 'url(../../Images/GreenHouse/CollagePage/' + i + ".jpg" + ')';
        grid.appendChild(cellBackground);
    }
</script>
